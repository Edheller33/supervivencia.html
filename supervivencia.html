<html lang="es" class="dark">
<head>
  <meta charset="UTF-8"/>

  <!-- ═══════════════════════════════════════════════════════
       MANIFIESTO PWA embebido como Data URL
       Incluye iconos SVG en Base64 para 192, 256 y 512px
  ═══════════════════════════════════════════════════════ -->
  <script>
  (function(){
    // SVG base para iconos: símbolo de radiación estilizado sobre negro
    const svgBase = (size) => {
      const s = size;
      const c = s/2;
      const r1 = s*0.38;
      const r2 = s*0.18;
      const r3 = s*0.07;
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">
        <rect width="${s}" height="${s}" fill="#000000"/>
        <circle cx="${c}" cy="${c}" r="${r1}" fill="none" stroke="#f59e0b" stroke-width="${s*0.025}"/>
        <circle cx="${c}" cy="${c}" r="${r2}" fill="#f59e0b" opacity="0.9"/>
        <circle cx="${c}" cy="${c}" r="${r3}" fill="#000000"/>
        <path d="M${c} ${c-r1*1.1} A${r1*1.1} ${r1*1.1} 0 0 1 ${c+r1*1.1*0.866} ${c+r1*1.1*0.5}" fill="none" stroke="#f59e0b" stroke-width="${s*0.06}" stroke-linecap="round"/>
        <path d="M${c+r1*1.1*0.866} ${c+r1*1.1*0.5} A${r1*1.1} ${r1*1.1} 0 0 1 ${c-r1*1.1*0.866} ${c+r1*1.1*0.5}" fill="none" stroke="#f59e0b" stroke-width="${s*0.06}" stroke-linecap="round"/>
        <path d="M${c-r1*1.1*0.866} ${c+r1*1.1*0.5} A${r1*1.1} ${r1*1.1} 0 0 1 ${c} ${c-r1*1.1}" fill="none" stroke="#f59e0b" stroke-width="${s*0.06}" stroke-linecap="round"/>
        <text x="${c}" y="${s*0.92}" fill="#f59e0b" font-family="monospace" font-size="${s*0.09}" text-anchor="middle" font-weight="bold">PROTOCOLO</text>
      </svg>`;
    };

    // Convertir SVG a base64
    const toB64 = (str) => btoa(unescape(encodeURIComponent(str)));

    const icons = [192, 256, 512].map(size => ({
      src: `data:image/svg+xml;base64,${toB64(svgBase(size))}`,
      sizes: `${size}x${size}`,
      type: "image/svg+xml",
      purpose: "any maskable"
    }));

    const manifest = {
      name: "Protocolo de Supervivencia",
      short_name: "PROTOCOLO",
      description: "Enciclopedia táctica offline para escenarios de colapso",
      start_url: "./",
      display: "standalone",
      background_color: "#000000",
      theme_color: "#2d7dd2",
      orientation: "portrait-primary",
      lang: "es",
      categories: ["education", "utilities"],
      icons: icons
    };

    const manifestBlob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
    const manifestURL = URL.createObjectURL(manifestBlob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestURL;
    document.head.appendChild(link);

    // Apple touch icon
    const appleIcon = document.createElement('link');
    appleIcon.rel = 'apple-touch-icon';
    appleIcon.href = `data:image/svg+xml;base64,${toB64(svgBase(192))}`;
    document.head.appendChild(appleIcon);
  })();
  </script>

  <!-- ═══════════════════════════════════════════════════════
       TAILWIND CSS 3 vía CDN
       La configuración se define ANTES de cargar el CDN
       usando la variable global tailwind.config para que
       el script del CDN la recoja al inicializarse.
  ═══════════════════════════════════════════════════════ -->
  <script>
    // Definir config ANTES de que cargue el CDN de Tailwind.
    // Tailwind CDN lee window.tailwind?.config al arrancar;
    // si lo definimos aquí el parser lo tomará correctamente.
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            amber: { 400: '#fbbf24', 500: 'var(--warn2)', 600: '#d97706' },
            green: { 400: '#4ade80', 500: '#22c55e' },
            red:   { 500: '#ef4444', 600: '#dc2626' }
          },
          fontFamily: {
            mono: ['"Share Tech Mono"', 'Courier New', 'monospace'],
          },
          minHeight: { touch: '48px' },
          fontSize:  { 'xxs': '0.65rem' }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fuente táctica terminal -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <style>
    /* ══════════════════════════════════════════════════════
       PALETA CORPORATIVA v2.0 — ALTA LEGIBILIDAD LUZ SOLAR
       ──────────────────────────────────────────────────────
       Primario:  #0f1923  (azul-grafito muy oscuro, base)
       Superficie:#16232f  (paneles y cards)
       Borde:     #2a3f52  (separadores)
       Acento:    #2d7dd2  (azul acero institucional)
       Texto 1:   #e8edf2  (blanco crema — ratio >7:1 sobre fondo)
       Texto 2:   #a0b4c8  (gris azulado — subtítulos)
       Alerta:    #e85d2f  (rojo-naranja — critico, visible al sol)
       Éxito:     #2eb87c  (verde esmeralda corporativo)
       Aviso:     #d4a017  (ámbar oscuro — advertencia, no brillante)
       ────────────────────────────────────────────────────── */
    :root {
      --bg:       #0f1923;
      --surface:  #16232f;
      --surface2: #1d2f3e;
      --border:   #2a3f52;
      --border2:  #3a5268;
      --accent:   #2d7dd2;
      --accent2:  #4a9de8;
      --text1:    #e8edf2;
      --text2:    #a0b4c8;
      --text3:    #6b8499;
      --danger:   #e85d2f;
      --danger2:  #ff7a52;
      --success:  #2eb87c;
      --success2: #4dd49a;
      --warn:     #d4a017;
      --warn2:    #f0b929;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text1);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    ::-webkit-scrollbar { width: 4px; background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    @keyframes scan {
      0%   { transform: translateY(-100vh); }
      100% { transform: translateY(100vh); }
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    /* Línea de barrido sutil — azul en lugar de ámbar */
    .scan-line::after {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      opacity: 0.25;
      animation: scan 8s linear infinite;
      pointer-events: none; z-index: 9999;
    }
    .cursor-blink { animation: blink 1s step-end infinite; }
    .fade-in { animation: fadeIn 0.3s ease-out forwards; }

    /* ── BOTONES ─────────────────────────────────────────── */
    .btn-tactical {
      min-height: 48px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text1);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
      padding: 0.75rem 1rem;
      text-align: left;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-tactical:hover, .btn-tactical:active {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--accent2);
    }
    .btn-tactical.active {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--accent2);
    }
    .btn-danger {
      border-color: var(--danger);
      color: var(--danger2);
      background: var(--surface);
    }
    .btn-danger:hover { background: rgba(232,93,47,0.1); border-color: var(--danger2); }
    .btn-green {
      border-color: var(--success);
      color: var(--success2);
      background: var(--surface);
    }
    .btn-green:hover { background: rgba(46,184,124,0.1); border-color: var(--success2); }

    /* ── PANELES ─────────────────────────────────────────── */
    .panel {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 4px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }
    .panel-danger { border-color: var(--danger); background: rgba(232,93,47,0.07); }
    .panel-green  { border-color: var(--success); background: rgba(46,184,124,0.07); }
    .panel-blue   { border-color: var(--accent);  background: rgba(45,125,210,0.07); }
    .panel-warn   { border-color: var(--warn);    background: rgba(212,160,23,0.07); }

    /* ── ETIQUETAS / TAGS ────────────────────────────────── */
    .tag {
      display: inline-block;
      font-size: 0.58rem;
      padding: 2px 7px;
      border-radius: 2px;
      letter-spacing: 0.12em;
      font-weight: bold;
    }
    .tag-red   { background:rgba(232,93,47,0.2);  color:var(--danger2);  border:1px solid rgba(232,93,47,0.5); }
    .tag-amber { background:rgba(212,160,23,0.2); color:var(--warn2);    border:1px solid rgba(212,160,23,0.5); }
    .tag-green { background:rgba(46,184,124,0.2); color:var(--success2); border:1px solid rgba(46,184,124,0.5); }
    .tag-blue  { background:rgba(45,125,210,0.2); color:var(--accent2);  border:1px solid rgba(45,125,210,0.5); }
    .tag-gray  { background:rgba(160,180,200,0.15); color:var(--text2);  border:1px solid var(--border2); }

    .divider { border:none; border-top:1px solid var(--border); margin:0.75rem 0; }

    /* ── FORMULARIOS ─────────────────────────────────────── */
    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text1);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      padding: 0.6rem 0.75rem;
      width: 100%;
      min-height: 48px;
      border-radius: 3px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(45,125,210,0.2);
    }
    select option { background: var(--surface2); color: var(--text1); }
    input::placeholder, textarea::placeholder { color: var(--text3); }

    /* ── TIPOGRAFÍA ──────────────────────────────────────── */
    .section-title {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      border-left: 2px solid var(--accent);
      padding-left: 0.4rem;
    }

    /* ── NAVEGACIÓN ──────────────────────────────────────── */
    .nav-bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: grid; grid-template-columns: repeat(6, 1fr);
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-btn {
      min-height: 56px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px;
      cursor: pointer;
      color: var(--text3);
      font-size: 0.5rem;
      letter-spacing: 0.08em;
      transition: color 0.15s, background 0.15s;
      padding: 8px 2px;
      border: none;
      background: none;
    }
    .nav-btn.active {
      color: var(--accent2);
      background: rgba(45,125,210,0.1);
      border-top: 2px solid var(--accent);
    }
    .nav-btn svg { width: 18px; height: 18px; }

    /* ── LAYOUT ──────────────────────────────────────────── */
    .main-content {
      padding-bottom: 80px;
      padding-top: 56px;
      min-height: 100vh;
    }
    .header-bar {
      position: fixed; top: 0; left: 0; right: 0;
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      height: 56px;
      display: flex; align-items: center;
      padding: 0 1rem;
      z-index: 100;
      gap: 0.5rem;
    }

    /* ── CALCULADORA SLIDER ──────────────────────────────── */
    .rad-calc input[type=range] {
      -webkit-appearance: none;
      background: var(--border);
      height: 4px;
      border-radius: 2px;
      outline: none;
      min-height: unset;
      border: none;
      padding: 0;
    }
    .rad-calc input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid var(--text1);
    }

    /* ── BARRA DE PROGRESO ───────────────────────────────── */
    .progress-bar {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* ── TABLAS ──────────────────────────────────────────── */
    .table-tactical { width:100%; border-collapse:collapse; font-size:0.75rem; }
    .table-tactical th {
      text-align:left; padding:7px 8px;
      border-bottom: 2px solid var(--border);
      color: var(--text3);
      font-size:0.6rem; letter-spacing:0.15em;
      background: var(--surface2);
    }
    .table-tactical td {
      padding:8px 8px;
      border-bottom:1px solid var(--border);
      color: var(--text1);
    }
    .table-tactical tr:last-child td { border-bottom:none; }
    .table-tactical tr:hover td { background: var(--surface2); }

    /* ── BADGE DE RED ────────────────────────────────────── */
    .offline-badge {
      position: fixed; top: 12px; right: 72px;
      font-size: 0.55rem; padding: 2px 7px;
      border-radius: 10px; z-index: 200;
      background: rgba(46,184,124,0.2);
      color: var(--success2);
      border: 1px solid rgba(46,184,124,0.5);
      font-weight: bold; letter-spacing: 0.08em;
    }
    .offline-badge.offline-no {
      background: rgba(232,93,47,0.2);
      color: var(--danger2);
      border-color: rgba(232,93,47,0.5);
    }

    /* ── TEXTO CON COLOR CORPORATIVO ─────────────────────── */
    .text-accent   { color: var(--accent2) !important; }
    .text-danger   { color: var(--danger2) !important; }
    .text-success  { color: var(--success2) !important; }
    .text-warn     { color: var(--warn2) !important; }
    .text-muted    { color: var(--text2) !important; }
    .text-dimmed   { color: var(--text3) !important; }
    .text-primary  { color: var(--text1) !important; }

    /* ── REFUGIOS: CARDS ─────────────────────────────────── */
    .shelter-card {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 4px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .shelter-card:hover, .shelter-card:active {
      border-color: var(--accent);
      background: var(--surface2);
    }
    .shelter-card.cat-a { border-left: 3px solid var(--success); }
    .shelter-card.cat-b { border-left: 3px solid var(--accent); }
    .shelter-card.cat-c { border-left: 3px solid var(--warn); }
    .shelter-card.cat-d { border-left: 3px solid var(--danger); }

    /* ── TOOLTIP ─────────────────────────────────────────── */
    .tooltip { display: none; }
    .tooltip-parent:active .tooltip { display: block; }
  </style>
</head>

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT: NÚCLEO DE LA APLICACIÓN
═══════════════════════════════════════════════════════════ -->
<script>
/* ═══════════════════════════════════════════════════════════
   MÓDULO: SERVICE WORKER (embebido via Blob URL)
   Estrategia: Cache-First con fallback offline total
   La app es 100% funcional sin internet tras primer carga
═══════════════════════════════════════════════════════════ */
const SW_VERSION = 'protocolo-v2.0';

const swCode = `
const CACHE = '${SW_VERSION}';
const OFFLINE_URLS = ['/'];

// Al instalar: cachea la página actual inmediatamente
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(cache => {
      // No fallamos si no se pueden cachear recursos externos
      return cache.addAll(OFFLINE_URLS).catch(() => {});
    }).then(() => self.skipWaiting())
  );
});

// Al activar: limpia caches viejos
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

// Estrategia Cache-First: sirve desde cache, va a red si no hay
self.addEventListener('fetch', e => {
  // Solo interceptar GETs
  if (e.request.method !== 'GET') return;
  
  e.respondWith(
    caches.match(e.request).then(cached => {
      if (cached) return cached;
      
      return fetch(e.request).then(response => {
        // Cachear respuestas válidas (no errores, no opacas de cross-origin importantes)
        if (response && response.status === 200) {
          const clone = response.clone();
          caches.open(CACHE).then(cache => cache.put(e.request, clone));
        }
        return response;
      }).catch(() => {
        // Si falla la red y no hay cache: responde con página offline básica
        if (e.request.destination === 'document') {
          return caches.match('/') || new Response(
            '<html><body style="background:var(--surface);color:var(--warn2);font-family:monospace;padding:2rem;"><h1>OFFLINE</h1><p>Protocolo operacional en modo autónomo.</p></body></html>',
            { headers: { 'Content-Type': 'text/html' } }
          );
        }
      });
    })
  );
});
`;

// Registrar Service Worker embebido.
// Estrategia: intentar data: URL (más compatible que blob: en Android/Samsung).
// Si falla silenciosamente — la app es 100% funcional sin SW, ya que toda la
// lógica y el contenido están embebidos en este mismo archivo HTML.
if ('serviceWorker' in navigator) {
  try {
    const swEncoded = 'data:application/javascript;base64,' + btoa(unescape(encodeURIComponent(swCode)));
    navigator.serviceWorker.register(swEncoded, { scope: './' })

/* ═══════════════════════════════════════════════════════════
   MÓDULO: PERSISTENCIA (localStorage avanzado)
   Guarda: perfil, inventario, estado del grupo, notas
   Resistente a reinicios forzados del dispositivo
═══════════════════════════════════════════════════════════ */
const Storage = {
  PREFIX: 'protocolo_',

  // Guardar dato serializado con timestamp
  set(key, value) {
    try {
      const payload = { v: value, ts: Date.now() };
      localStorage.setItem(this.PREFIX + key, JSON.stringify(payload));
      return true;
    } catch(e) {
      console.warn('[Storage] Error guardando:', key, e);
      return false;
    }
  },

  // Recuperar dato
  get(key, fallback = null) {
    try {
      const raw = localStorage.getItem(this.PREFIX + key);
      if (!raw) return fallback;
      const parsed = JSON.parse(raw);
      return parsed.v !== undefined ? parsed.v : fallback;
    } catch(e) {
      return fallback;
    }
  },

  // Eliminar dato
  remove(key) {
    localStorage.removeItem(this.PREFIX + key);
  },

  // Exportar TODOS los datos como texto plano copiable
  // Útil si el dispositivo falla: el usuario puede dictar/copiar a papel
  exportPlain() {
    const lines = ['=== PROTOCOLO DE SUPERVIVENCIA - BACKUP ==='];
    lines.push(`FECHA: ${new Date().toISOString()}`);
    lines.push('');
    
    const keys = Object.keys(localStorage)
      .filter(k => k.startsWith(this.PREFIX));
    
    keys.forEach(k => {
      try {
        const payload = JSON.parse(localStorage.getItem(k));
        const cleanKey = k.replace(this.PREFIX, '').toUpperCase();
        const val = typeof payload.v === 'object' 
          ? JSON.stringify(payload.v, null, 2) 
          : String(payload.v);
        lines.push(`[${cleanKey}]`);
        lines.push(val);
        lines.push('');
      } catch(e) {}
    });
    
    lines.push('=== FIN DEL BACKUP ===');
    return lines.join('\n');
  },

  // Limpiar todos los datos (con confirmación en UI)
  clearAll() {
    const keys = Object.keys(localStorage).filter(k => k.startsWith(this.PREFIX));
    keys.forEach(k => localStorage.removeItem(k));
  }
};

/* ═══════════════════════════════════════════════════════════
   CONTROLADOR PRINCIPAL: App
   Gestiona navegación, cálculos y estado global
═══════════════════════════════════════════════════════════ */
const App = {

  // Inicializar la aplicación
  init() {
    this.updateClock();
    setInterval(() => this.updateClock(), 1000);
    this.checkNetwork();
    window.addEventListener('online', () => this.checkNetwork());
    window.addEventListener('offline', () => this.checkNetwork());
    this.nav('home');
    // Auto-calcular valores en calculadora
    setTimeout(() => {
      this.calcRad();
      this.calcWater();
      this.calcCal();
    }, 100);
  },

  // Actualizar reloj en header
  updateClock() {
    const el = document.getElementById('headerClock');
    if (el) {
      const now = new Date();
      el.textContent = now.toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }
  },

  // Verificar estado de red
  checkNetwork() {
    const badge = document.getElementById('networkBadge');
    if (!badge) return;
    if (navigator.onLine) {
      badge.textContent = '● ONLINE';
      badge.className = 'offline-badge';
    } else {
      badge.textContent = '● OFFLINE';
      badge.className = 'offline-badge offline-no';
    }
  },

  // Actualizar subtítulo del header
  updateHeader() {
    const sub = document.getElementById('headerSub');
    if (!sub) return;
    const p = State.profile;
    sub.textContent = p ? `OP: ${p.name.toUpperCase().substring(0,12)}` : 'SISTEMA OPERACIONAL';
  },

  // Navegar entre vistas principales
  nav(viewName) {
    State.currentView = viewName;
    const main = document.getElementById('mainContent');
    if (!main) return;

    // Cerrar modal si hay uno abierto
    this.closeModal();

    // Renderizar vista
    const html = Views[viewName] ? Views[viewName]() : '<div style="padding:1rem">Vista no encontrada</div>';
    main.innerHTML = `<div class="fade-in">${html}</div>`;

    // Actualizar nav activo
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === viewName);
    });

    // Inicializar calculadoras si aplica
    if (viewName === 'calculator') {
      setTimeout(() => { this.calcRad(); this.calcWater(); this.calcCal(); }, 50);
    }

    // Scroll al top
    window.scrollTo(0, 0);
  },

  // Guardar configuración inicial
  saveSetup() {
    const name = document.getElementById('setupName')?.value.trim();
    const location = document.getElementById('setupLocation')?.value;
    const group = document.getElementById('setupGroup')?.value;
    const supplies = document.getElementById('setupSupplies')?.value;
    const region = document.getElementById('setupRegion')?.value;

    if (!name || !location || !group || !supplies) {
      // Indicar campos faltantes
      ['setupName','setupLocation','setupGroup','setupSupplies'].forEach(id => {
        const el = document.getElementById(id);
        if (el && !el.value) el.style.borderColor = '#ef4444';
      });
      return;
    }

    State.saveProfile({ name, location, group, supplies, region, setupDate: new Date().toISOString() });
    this.nav('home');
  },

  // Resetear perfil (volver a setup)
  resetProfile() {
    if (confirm('¿Resetear perfil? Las notas y datos de inventario se conservarán.')) {
      Storage.remove('profile');
      State.profile = null;
      this.nav('home');
    }
  },

  // Confirmar borrado total
  confirmReset() {
    if (confirm('⚠ ADVERTENCIA: Se borrarán TODOS los datos del protocolo. ¿Continuar?')) {
      if (confirm('¿Estás seguro? Esta acción no se puede deshacer.')) {
        Storage.clearAll();
        State.profile = null;
        State.notes = '';
        location.reload();
      }
    }
  },

  // Mostrar modal de escenario
  showScenario(id) {
    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');
    if (!overlay || !content) return;
    content.innerHTML = Modals.scenario(id);
    overlay.style.display = 'block';
    overlay.scrollTop = 0;
  },

  // Mostrar modal de conocimiento

    const overlay = document.getElementById('modalOverlay');

    content.innerHTML = Modals.knowledge(id);

    overlay.scrollTop = 0;

  // ── CALCULADORA: REGLA DEL 7-10 ──────────────────────────
  calcRad() {
    const initial = parseFloat(document.getElementById('radInitial')?.value) || 1000;
    const step = parseInt(document.getElementById('radTime')?.value) || 1;
    const timeLabel = document.getElementById('radTimeLabel');
    const result = document.getElementById('radValue');
    const risk = document.getElementById('radRisk');

    // Los pasos son: 1, 7, 49, 343, 2401, 16807, 117649 horas
    const times = [1, 7, 49, 343, 2401, 16807, 117649];
    const hours = times[step];
    const dose = initial / Math.pow(10, step);

    if (timeLabel) {
      const days = hours >= 24 ? ` (${(hours/24).toFixed(1)} días)` : '';
      timeLabel.textContent = `${hours} horas${days}`;
    }
    if (result) result.textContent = `${dose >= 1 ? dose.toFixed(1) : dose.toFixed(3)} R/h`;

    // Clasificar riesgo
    if (risk) {
      if (dose > 300) risk.textContent = '☠ LETAL en exposición de minutos. Refugio inmediato obligatorio.';
      else if (dose > 100) risk.textContent = '⚠ MUY PELIGROSO. Máximo 15 min exposición para emergencias absolutas.';
      else if (dose > 10) risk.textContent = '⚠ PELIGROSO. Solo salir si es absolutamente necesario. Protección máxima.';
      else if (dose > 1) risk.textContent = '⚡ RIESGO REDUCIDO. Salidas breves con ropa de protección posibles.';
      else if (dose > 0.1) risk.textContent = '✓ BAJO RIESGO. Actividad moderada posible con precauciones.';
      else risk.textContent = '✓ SEGURO. Nivel comparable a fondo de radiación natural.';
    }
  },

  // ── CALCULADORA: AGUA ──────────────────────────────────────
  calcWater() {
    const people = parseInt(document.getElementById('waterPeople')?.value) || 1;
    const days = parseInt(document.getElementById('waterDays')?.value) || 14;
    const liters = people * days * 4;
    const el = document.getElementById('waterValue');
    if (el) {
      el.textContent = `${liters} litros`;
      el.nextElementSibling?.remove();
      const note = document.createElement('div');
      note.style.cssText = 'font-size:0.65rem; color:var(--text3); margin-top:0.25rem;';
      note.textContent = `= ${(liters/19).toFixed(0)} garrafones de 19L · ${(liters/208).toFixed(1)} tambos de 200L`;
      el.parentNode.appendChild(note);
    }
  },

  // ── CALCULADORA: CALORÍAS ─────────────────────────────────
  calcCal() {
    const people = parseInt(document.getElementById('calPeople')?.value) || 1;
    const days = parseInt(document.getElementById('calDays')?.value) || 30;
    const kcal = people * days * 2000;
    const el = document.getElementById('calValue');
    if (el) {
      el.textContent = `${kcal.toLocaleString()} kcal total`;
      // Equivalencias en arroz y frijol
      const riceKg = (kcal * 0.6 / 3650).toFixed(1);
      const beanKg = (kcal * 0.4 / 3400).toFixed(1);
      el.nextElementSibling?.remove();
      const note = document.createElement('div');
      note.style.cssText = 'font-size:0.65rem; color:var(--text3); margin-top:0.25rem;';
      note.textContent = `Base arroz+frijol: ~${riceKg}kg arroz + ~${beanKg}kg frijol`;
      el.parentNode.appendChild(note);
    }
  },

  // ── EXPORTAR BACKUP ────────────────────────────────────────
  exportBackup() {
    const text = Storage.exportPlain();
    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');

    content.innerHTML = `
      <div style="padding:0;">
        <div class="header-bar" style="position:sticky; top:0;">
          <button onclick="App.closeModal()" style="background:none; border:none; color:var(--warn2); font-size:1rem; cursor:pointer; padding:0.5rem;">←</button>
          <div style="flex:1; font-size:0.75rem; color:var(--warn2);">BACKUP DE DATOS</div>
        </div>
        <div style="padding:1rem; padding-top:1.5rem;">
          <div class="panel panel-green" style="margin-bottom:1rem;">
            <p style="font-size:0.72rem; color:var(--success2); margin:0;">
              Copia manualmente el texto a continuación. Guárdalo en otro dispositivo, papel o almacenamiento externo.
            </p>
          </div>
          <textarea style="font-size:0.65rem; min-height:300px; resize:none; background:var(--surface); border-color:var(--success2)44; color:var(--success2)88; font-family:'Share Tech Mono',monospace; line-height:1.5;" 
            readonly onclick="this.select()">${text}</textarea>
          <button class="btn-tactical btn-green" onclick="App.copyToClipboard()" style="margin-top:0.5rem; justify-content:center; width:100%;">
            📋 COPIAR AL PORTAPAPELES
          </button>
        </div>
      </div>
    `;
    overlay.style.display = 'block';
    overlay.scrollTop = 0;
  },

  // Copiar backup al portapapeles
  copyToClipboard() {
    const textarea = document.querySelector('#modalContent textarea');
    if (!textarea) return;
    textarea.select();
    try {
      navigator.clipboard.writeText(textarea.value).then(() => {
        const btn = document.querySelector('#modalContent .btn-green');
        if (btn) {
          btn.textContent = '✓ COPIADO';
          setTimeout(() => { btn.textContent = '📋 COPIAR AL PORTAPAPELES'; }, 2000);
        }
      });
    } catch(e) {
      document.execCommand('copy');
    }
  }
};

/* ═══════════════════════════════════════════════════════════
   UTILIDADES
═══════════════════════════════════════════════════════════ */
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// Cerrar modal al presionar fuera del contenido
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) App.closeModal();
});

// Gestión de botón "atrás" del dispositivo
window.addEventListener('popstate', () => {
  if (document.getElementById('modalOverlay').style.display !== 'none') {
    App.closeModal();
  }
});

/* ═══════════════════════════════════════════════════════════
   ARRANQUE DEL SISTEMA
═══════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
